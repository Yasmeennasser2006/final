<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .Request-button {
        background-color: black;
        color: white;
        border: none;
        margin: 10px;
        padding: 5px;
      }
      .Request-button:hover,
      .Add-button:hover,
      .Sign-button:hover,
      .Get-button:hover,
      .Download-button:hover,
      .Apply-button:hover,
      .Save-button:hover {
        transition: all 0.6s;
        cursor: pointer;
      }
      .Sign-button,
      .Get-button,
      .Download-button,
      .Apply-button,
      .Save-button {
        font-family: Tahoma;
      }

      .Request-button:hover {
        color: darkgrey;
      }
      .Add-button {
        background-color: rgb(255, 216, 20);
        color: black;
        border: none;
        padding: 5px 30px;
        border-radius: 15px;
        margin: 10px;
      }
      .Add-button:hover {
        background-color: rgb(255, 164, 28);
      }
      .Sign-button {
        background-color: rgb(97, 197, 84);
        color: white;
        border: none;
        border-radius: 5px;
        margin: 10px;
        padding: 7px 15px 5px 15px;
      }
      .Get-button {
        background-color: rgb(140, 93, 183);
        color: white;
        font-family: Tahoma;
        border-radius: 4px;
        border: none;
        padding: 5px 15px;
        margin: 10px;
      }
      .Get-button:hover {
        background-color: rgb(121, 66, 173);
      }
      .Download-button {
        background-color: white;
        color: rgb(118, 115, 115);
        border: 1.4px solid rgb(118, 115, 115);
        padding: 4px 10px;
        margin: 10px;
        border-radius: 3px;
      }
      .Download-button:hover {
        background-color: rgb(118, 115, 115);
        color: white;
      }
      .Apply-button {
        background-color: rgb(20, 137, 255);
        color: white;
        border: none;
        padding: 5px 15px;
        margin: 10px;
        border-radius: 10px;
      }
      .Apply-button:hover {
        background-color: rgb(12, 107, 201);
      }
      .Save-button {
        background-color: white;
        color: rgb(20, 137, 255);
        border: 1.5px solid rgb(20, 137, 255);
        padding: 5px 15px;
        margin: 10px;
        border-radius: 15px;
      }
      .Save-button:hover {
        background-color: rgb(191, 219, 247);
        box-shadow: inset 0 0 0 1.3px rgb(20, 137, 255);
      }
    </style>
  </head>
  <body>
    <button class="Request-button">Request Now</button>
    <button class="Add-button">Add to Cart</button>
    <button class="Sign-button">Sign up</button>
    <button class="Get-button">Get started</button>
    <button class="Download-button">Download</button>
    <button class="Apply-button">Apply on company website</button>
    <button class="Save-button">Save</button>
  </body>
</html>
